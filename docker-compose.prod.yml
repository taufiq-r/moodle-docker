name: moodle-prod

services:
  postgres:
    image: postgres:17-alpine
    container_name: moodle-pgdb-prod
    restart: always
    environment:
      POSTGRES_DB:       ${PGSQL_DATABASE}
      POSTGRES_USER:     ${PGSQL_USER}
      POSTGRES_PASSWORD: ${PGSQL_PASSWORD}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    networks:
      - moodle-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGSQL_USER} -d ${PGSQL_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  moodleapp:
    # image: ghcr.io/${GITHUB_OWNER}/moodle:${MOODLE_IMAGE_TAG:-latest}
    # container_name: moodle-web-prod
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: moodle-web-prod
    container_name: moodle-web-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT:         production
      PGSQL_HOST:          ${PGSQL_HOST}
      PGSQL_USER:          ${PGSQL_USER}
      PGSQL_DATABASE:      ${PGSQL_DATABASE}
      PGSQL_PASSWORD:      ${PGSQL_PASSWORD}
      MOODLE_WWWROOT:      ${MOODLE_WWWROOT}
      RESTORE_ON_EMPTY_DB: ${RESTORE_ON_EMPTY_DB:-false}
    volumes:
      - moodledata-prod:/var/www/moodledata    # ← named volume
      - ./src:/var/www/html

    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - moodle-prod-network
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: moodle-nginx-prod
    restart: always
    depends_on:
      moodleapp:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./config/nginx/nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs:/var/log/nginx
      - ./src/public:/var/www/html/public:ro

    networks:
      - moodle-prod-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  moodle-cron:
    # image: ghcr.io/${GITHUB_OWNER}/moodle:${MOODLE_IMAGE_TAG:-latest}
    # container_name: moodle-cron-prod
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: moodle-web-prod
    container_name: moodle-cron-prod
    restart: always
    depends_on:
      moodleapp:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c", "/entrypoint.sh /opt/scripts/cron.sh run"]
    environment:
      ENVIRONMENT:    production
      PGSQL_HOST:     ${PGSQL_HOST}
      PGSQL_USER:     ${PGSQL_USER}
      PGSQL_DATABASE: ${PGSQL_DATABASE}
      PGSQL_PASSWORD: ${PGSQL_PASSWORD}
    volumes:
      # - ./data/moodledata:/var/www/moodledata
      - moodledata-prod:/var/www/moodledata
      - ./src:/var/www/html
    networks:
      - moodle-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond > /dev/null && test -f /var/www/html/config.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  pgdata-prod:
  moodledata-prod:

networks:
  moodle-prod-network:
    driver: bridge