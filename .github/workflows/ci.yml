name: CI Pipeline
on:
  push:
    branches: [develop, master]
env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/moodle


jobs:
  build-test-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write #read, Akses 'write' untuk membuat git tag
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Penting agar riwayat commit terbaca untuk versioning
      
          ##  AUTO-TAGGING (Hanya berjalan jika Anda push/merge ke branch 'master')
      - name: Bump version and push tag
        id: tag_version
        if: github.ref == 'refs/heads/master'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          default_bump: false
          custom_release_rules: |
            feat:minor
            fix:patch
            perf:patch
            refactor:patch
            feat!:major
            docs:none
            chore:none
            ci:none
            test:none
            style:none
        
        # PENENTUAN NAMA DOCKER IMAGE DINAMIS
      - name: Determine Docker Tag
        id: set_env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
             echo "TAG=${{ steps.tag_version.outputs.new_tag }}" >> $GITHUB_ENV
          else
             echo "TAG=staging-${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        
      # BUILD DOCKER & CACHING
      - name: Build and export to Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          target: development
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.TAG }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Prepare src directory
        run: |
          mkdir -p src/public
          echo "<?php // CI placeholder" > src/public/index.php
      
        #TESTING 
      - name: Tag for compose test
        run: docker tag ${{ env.IMAGE_NAME }}:${{ env.TAG }} moodle-web-dev:latest     

      - name: Start test stack & Wait
        run: |
          docker compose -f docker-compose.dev.yml --env-file .env.ci up -d
          for i in {1..24}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' moodle-web-dev 2>/dev/null || echo "not found")
            if [ "$STATUS" = "healthy" ]; then break; fi
            if [ $i -eq 24 ]; then exit 1; fi
            sleep 5
          done

      - name: Test Requirements
        run: |
          docker compose -f docker-compose.dev.yml --env-file .env.ci \
            exec -T moodleapp php -v
          docker compose -f docker-compose.dev.yml --env-file .env.ci \
            exec -T moodleapp php -r "
              \$db=getenv('PGSQL_DATABASE')?:'moodle';
              \$user=getenv('PGSQL_USER')?:'moodle';
              \$pass=getenv('PGSQL_PASSWORD')?:'moodle';
              \$host=getenv('PGSQL_HOST')?:'postgres';
              \$c=pg_connect(\"host=\$host dbname=\$db user=\$user password=\$pass\");
              if(!\$c){echo 'DB FAILED';exit(1);}
              echo 'DB OK';
            "
          docker compose -f docker-compose.dev.yml --env-file .env.ci \
            exec -T moodleapp test -f /var/www/html/config.php \
            && echo "OK" \
            || echo "Fresh Install"

      #PUSH IMAGE KE GHCR JIKA LOLOS TEST
      - name: Push tested image to GHCR
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.TAG }}
          # Jika berada di MASTER, update tag 'latest' agar mudah ditarik Windows
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            docker tag ${{ env.IMAGE_NAME }}:${{ env.TAG }} ${{ env.IMAGE_NAME }}:latest
            docker push ${{ env.IMAGE_NAME }}:latest
          fi

      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.dev.yml --env-file .env.ci down -v

        # NOTIFIKASI DISCORD SUCCESS
      - name: Send Notification to Discord - Success
        if: success() && env.DISCORD_WEBHOOK_URL !=''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cat > /tmp/discord_payload.json << 'EOFPAYLOAD'
          {
            "embeds": [{
              "title": "✅ Moodle CI Build Success (BRANCH_PLACEHOLDER)",
              "description": "**Repository:** ${{ github.repository }}\n**Branch:** BRANCH_PLACEHOLDER\n**Image Tag:** TAG_PLACEHOLDER\n**Commit:** [SHORT_SHA_PLACEHOLDER](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\n**Author:** @${{ github.actor }}",
              "color": 3066993,
              "footer": { "text": "GitHub Actions" },
              "timestamp": "TS_PLACEHOLDER"
            }]
          }
          EOFPAYLOAD
          sed -i "s/BRANCH_PLACEHOLDER/${{ github.ref_name }}/g" /tmp/discord_payload.json
          sed -i "s/TAG_PLACEHOLDER/${{ env.TAG }}/g"            /tmp/discord_payload.json
          sed -i "s/SHORT_SHA_PLACEHOLDER/${SHORT_SHA}/g"        /tmp/discord_payload.json
          sed -i "s/TS_PLACEHOLDER/${TS}/g"                      /tmp/discord_payload.json
          curl -fsS -H "Content-Type: application/json" -d @/tmp/discord_payload.json "$DISCORD_WEBHOOK_URL"

      # NOTIFIKASI DISCORD - FAILED
      - name: Send Discord notification - Failed
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cat > /tmp/discord_payload.json << 'EOFPAYLOAD'
          {
            "embeds": [{
              "title": "❌ Moodle CI Build FAILED (BRANCH_PLACEHOLDER)",
              "description": "**Repository:** ${{ github.repository }}\n**Branch:** BRANCH_PLACEHOLDER\n**Commit:** [SHORT_SHA_PLACEHOLDER](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\n**Author:** @${{ github.actor }}\n**Logs:** [View Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\nProses CI gagal! Silakan periksa log untuk melihat error pada tahap build atau test.",
              "color": 15158332,
              "footer": { "text": "GitHub Actions" },
              "timestamp": "TS_PLACEHOLDER"
            }]
          }
          EOFPAYLOAD
          sed -i "s/BRANCH_PLACEHOLDER/${{ github.ref_name }}/g" /tmp/discord_payload.json
          sed -i "s/SHORT_SHA_PLACEHOLDER/${SHORT_SHA}/g"        /tmp/discord_payload.json
          sed -i "s/TS_PLACEHOLDER/${TS}/g"                      /tmp/discord_payload.json
          curl -fsS -H "Content-Type: application/json" -d @/tmp/discord_payload.json "$DISCORD_WEBHOOK_URL"