name: CI Build & Test

on:
  push:
    branches: [develop]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/moodle:test-${{ github.sha }} .

      - name: Run basic test
        run: docker run --rm ${{ secrets.DOCKER_USERNAME }}/moodle:test-${{ github.sha }} php -v