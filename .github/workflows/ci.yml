
name: CI Build & Test
on:
  push:
    branches: [develop]

env:
  COMPOSE_FILE: docker-compose.dev.yml

jobs:
  build-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/moodle:test-${{ github.sha }} .

      - name: Smoke test image
        run: docker run --rm --entrypoint php ${{ secrets.DOCKER_USERNAME }}/moodle:test-${{ github.sha }} -v

      - name: Start test stack
        run: docker compose -f docker-compose.dev.yml --env-file .env.ci up -d
        
      - name: Wait for Moodle
        run: |
          for i in {1..30}; do
            docker compose exec -T moodleapp php -v && break
            sleep 5
          done
        
      - name: Test Moodle database
        run: docker compose exec -T moodleapp php admin/cli/check_database_schema.php

      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.dev.yml --env-file .env.ci down
