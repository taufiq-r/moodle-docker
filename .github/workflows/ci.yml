
name: CI Build & Test
on:
  push:
    branches: [develop]

env:
  COMPOSE_FILE: docker-compose.dev.yml

jobs:
  build-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/moodle:test-${{ github.sha }} .

      - name: Smoke test image
        run: docker run --rm --entrypoint php ${{ secrets.DOCKER_USERNAME }}/moodle:test-${{ github.sha }} -v

      - name: Start test stack
        run: docker compose -f docker-compose.dev.yml --env-file .env.ci up -d
        
      - name: Wait for container healthy
        run: |
          echo "Waiting for moodle-web-dev healthy..."
          for i in {1..24}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' moodle-web-dev 2>/dev/null || echo "not found")
            echo "Attempt $i/24: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy!"
              break
            fi
            if [ $i -eq 24 ]; then
              echo "Timeout waiting for container!"
              docker compose -f docker-compose.dev.yml --env-file .env.ci logs
              exit 1
            fi
            sleep 5
          done

      #- name: Wait for PHP-FPM ready
        #run: |
          #echo "Waiting for PHP-FPM..."
          #for i in {1..30}; do
            #docker compose -f docker-compose.dev.yml --env-file .env.ci exec -T moodleapp php -v && break
            #echo "Attempt $i: PHP not ready yet..."
            #sleep 5
          #done

      - name: Show containers
        run: docker compose -f docker-compose.dev.yml --env-file .env.ci ps

      - name: Install Moodle if needed
        run: |
          docker compose -f docker-compose.dev.yml --env-file .env.ci exec -T moodleapp bash -c "
            cd /var/www/html && \
            php admin/cli/install_database.php \
              --agree-license \
              --adminuser=admin \
              --adminpass=Admin123! \
              --adminemail=admin@example.com \
              --fullname='CI Moodle' \
              --shortname='CI' || true
          "
        
      - name: Test Moodle database
        run: docker compose -f docker-compose.dev.yml --env-file .env.ci exec -T moodleapp bash -c "cd /var/www/html && php admin/cli/check_database_schema.php"     
      - name: Show logs if failed
        if: failure()
        run: docker compose -f docker-compose.dev.yml --env-file .env.ci logs
        
      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.dev.yml --env-file .env.ci down -v
