name: CI Build & Test
on:
  push:
    branches: [develop]
env:
  COMPOSE_FILE: docker-compose.dev.yml
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t moodle:test-${{ github.sha }} .

      - name: Smoke test image
        run: docker run --rm --entrypoint php moodle:test-${{ github.sha }} -v

      - name: Start test stack
        run: docker compose -f docker-compose.dev.yml --env-file .env.ci up -d

      - name: Wait for container healthy
        run: |
          for i in {1..24}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' moodle-web-dev 2>/dev/null || echo "not found")
            echo "Attempt $i/24: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy!"
              break
            fi
            if [ $i -eq 24 ]; then
              echo "Timeout!"
              docker compose -f docker-compose.dev.yml --env-file .env.ci logs
              exit 1
            fi
            sleep 5
          done

      - name: Test PHP
        run: docker compose -f docker-compose.dev.yml --env-file .env.ci exec -T moodleapp php -v

      - name: Test database connection
        run: |
          docker compose -f docker-compose.dev.yml --env-file .env.ci exec -T moodleapp bash -c "
            php -r \"\\\$c=pg_connect('host=postgres dbname=moodle user=moodle password=ci-test-password');
            if(!\\\$c){echo 'DB FAILED';exit(1);}echo 'DB OK';\"
          "

      - name: Test Moodle config exists
        run: |
          docker compose -f docker-compose.dev.yml --env-file .env.ci exec -T moodleapp \
            test -f /var/www/html/config.php && echo "config.php OK" || exit 1

      - name: Show logs if failed
        if: failure()
        run: docker compose -f docker-compose.dev.yml --env-file .env.ci logs

      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.dev.yml --env-file .env.ci down -v
